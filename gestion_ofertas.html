<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Ofertas - Producto 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex gap-4">
            <a class="text-white text-decoration-none" href="index.html">Dashboard</a>
            <a class="text-white text-decoration-none" href="gestion_ofertas.html">Gestión Ofertas</a>
            <a class="text-white text-decoration-none" href="gestion_usuarios.html">Gestión Usuarios</a>
        </div>
        
        <div class="d-flex align-items-center">
            <span class="text-white me-3" id="user-logged">Invitado</span>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        </div>
    </div>
    </nav>
    <div class="container">
        <h2>Nueva Oferta o Demanda</h2>
        <div class="card mb-5 shadow-sm">
            <div class="card-body">
                <form id="form-gestion">
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" id="titulo" class="form-control" required placeholder="Ej: Programador backend">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="descripcion" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo de publicación</label>
                        <select id="tipo" class="form-select">
                            <option value="oferta">Oferta (Busco trabajador)</option>
                            <option value="demanda">Demanda (Busco empleo)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Publicar ahora</button>
                </form>
            </div>
        </div>

        <h3>Mis publicaciones</h3>
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-gestion">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/gestion.js"></script>
</body>
</html>
