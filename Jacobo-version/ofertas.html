<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobConnect Simple | Ofertas y demandas</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS propio -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Menú -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">JobConnect Simple</a>

      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link active" href="ofertas.html">Ofertas</a>
        <a class="nav-link" href="usuarios.html">Usuarios</a>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <h1 class="mb-4">Gestión de ofertas y demandas</h1>

    <div class="row">
      <!-- Formulario -->
      <div class="col-lg-5 mb-4">
        <div class="card">
          <div class="card-body">
            <h2 class="h4 mb-3">Nueva publicación</h2>

            <form id="form-publicacion">
              <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" class="form-select" required>
                  <option value="">Selecciona una opción</option>
                  <option value="oferta">Oferta</option>
                  <option value="demanda">Demanda</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea id="descripcion" class="form-control" rows="4" required></textarea>
              </div>

              <button type="submit" class="btn btn-primary">Añadir publicación</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Lista -->
      <div class="col-lg-7">
        <h2 class="h4 mb-3">Lista de publicaciones</h2>
        <div id="lista-ofertas" class="row"></div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- JS propio -->
  <script type="module" src="assets/js/ofertas.js"></script>
</body>
</html>
