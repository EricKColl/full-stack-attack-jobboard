<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobConnect Simple | Dashboard</title>

  <!-- Bootstrap: estilos ya preparados -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Nuestros estilos propios -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">JobConnect Simple</a>

      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link" href="ofertas.html">Ofertas</a>
        <a class="nav-link" href="usuarios.html">Usuarios</a>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="container mt-4">
    <h1 class="mb-4">Dashboard principal</h1>

    <div class="row">
      <!-- Tarjeta ofertas -->
      <div class="col-md-6 mb-3">
        <div class="card border-primary">
          <div class="card-body">
            <h2 class="card-title h4">Ofertas de empleo</h2>
            <p class="card-text">Total: <span id="total-ofertas">0</span></p>
          </div>
        </div>
      </div>

      <!-- Tarjeta demandas -->
      <div class="col-md-6 mb-3">
        <div class="card border-success">
          <div class="card-body">
            <h2 class="card-title h4">Demandas de empleo</h2>
            <p class="card-text">Total: <span id="total-demandas">0</span></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Zona donde luego mostraremos publicaciones -->
    <section class="mt-4">
      <h2 class="h4">Resumen de publicaciones</h2>
      <div id="lista-publicaciones" class="row"></div>
    </section>
  </main>

  <!-- JS de Bootstrap -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- JS de nuestra página -->
  <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
