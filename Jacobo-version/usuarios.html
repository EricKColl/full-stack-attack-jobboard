<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobConnect Simple | Usuarios</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS propio -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Menú -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">JobConnect Simple</a>

      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link" href="ofertas.html">Ofertas</a>
        <a class="nav-link active" href="usuarios.html">Usuarios</a>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <h1 class="mb-4">Gestión de usuarios</h1>

    <div class="row">
      <!-- Formulario -->
      <div class="col-lg-5 mb-4">
        <div class="card">
          <div class="card-body">
            <h2 class="h4 mb-3">Nuevo usuario</h2>

            <form id="form-usuario">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="email-usuario" class="form-label">Correo electrónico</label>
                <input type="email" id="email-usuario" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="password-usuario" class="form-label">Contraseña</label>
                <input type="password" id="password-usuario" class="form-control" required>
              </div>

              <button type="submit" class="btn btn-primary">Añadir usuario</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Lista -->
      <div class="col-lg-7">
        <h2 class="h4 mb-3">Lista de usuarios</h2>
        <div id="lista-usuarios" class="row"></div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- JS propio -->
  <script type="module" src="assets/js/usuarios.js"></script>
</body>
</html>
