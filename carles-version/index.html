<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobConnect Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                JobConnect
            </a>

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="ofertas.html">
                            Ofertas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="usuarios.html">
                            Usuarios
                        </a>
                    </li>

                </ul>

                <div id="zona-usuario"></div>

            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4">
            <h1 class="fw-bold">Dashboard JobConnect</h1>
            <p class="text-muted">Resumen general de la plataforma de ofertas y demandas laborales.</p>

            <button class="btn btn-sm btn-outline-secondary mt-2" onclick="location.reload()">
                Actualizar datos
            </button>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Usuarios</h5>
                        <p class="display-4 fw-bold mb-0" id="usuarios"></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ofertas</h5>
                        <p class="display-4 fw-bold text-success mb-0" id="ofertas"></p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Demandas</h5>
                        <p class="display-4 fw-bold text-primary mb-0" id="demandas"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h2 class="h4 mb-3">Publicaciones recientes</h2>
            <div id="lista-publicaciones" class="row g-3"></div>
        </div>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
