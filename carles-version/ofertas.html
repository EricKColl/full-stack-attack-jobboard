<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas y demandas - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                JobConnect
            </a>

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="ofertas.html">
                            Ofertas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="usuarios.html">
                            Usuarios
                        </a>
                    </li>
                </ul>

                <div id="zona-usuario"></div>

            </div>
        </div>
    </nav>

    <div class="container py-5">

        <div class="mb-4">
            <h1 class="fw-bold">Gestión de ofertas y demandas</h1>
            <p class="text-muted">
                Desde esta página se pueden crear, visualizar y eliminar publicaciones laborales.
            </p>
        </div>

        <div class="row g-4">

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Nueva publicación</h3>

                        <form id="form-publicacion">

                            <div class="mb-3">
                                <label for="tipo" class="form-label">Tipo</label>
                                <select class="form-select" id="tipo" required>
                                    <option value="">Selecciona un tipo</option>
                                    <option value="oferta">Oferta</option>
                                    <option value="demanda">Demanda</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="titulo" class="form-label">Título</label>
                                <input type="text" class="form-control" id="titulo" required>
                            </div>

                            <div class="mb-3">
                                <label for="ubicacion" class="form-label">Ubicación</label>
                                <input type="text" class="form-control" id="ubicacion" required>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" rows="4" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-dark w-100">
                                Añadir publicación
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Listado de publicaciones</h3>
                        <div id="lista-publicaciones" class="row g-3"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ofertas.js"></script>
</body>

</html>
