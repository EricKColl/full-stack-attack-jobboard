<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                JobConnect
            </a>

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="ofertas.html">
                            Ofertas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="usuarios.html">
                            Usuarios
                        </a>
                    </li>
                </ul>

                <div id="zona-usuario"></div>

            </div>
        </div>
    </nav>

    <div class="container py-5">

        <div class="mb-4">
            <h1 class="fw-bold">Gestión de usuarios</h1>
            <p class="text-muted">
                Desde esta página se pueden registrar, visualizar y eliminar usuarios.
            </p>
        </div>

        <div class="row g-4">

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Nuevo usuario</h3>

                        <form id="form-usuario">

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>

                            <div class="mb-3">
                                <label for="rol" class="form-label">Rol</label>
                                <select class="form-select" id="rol" required>
                                    <option value="">Selecciona un rol</option>
                                    <option value="candidato">Candidato</option>
                                    <option value="empresa">Empresa</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-dark w-100">
                                Añadir usuario
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Listado de usuarios</h3>

                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Email</th>
                                        <th>Rol</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-usuarios"></tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/usuarios.js"></script>
</body>

</html>
