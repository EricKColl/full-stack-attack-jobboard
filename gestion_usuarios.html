<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - Producto 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex gap-4">
            <a class="text-white text-decoration-none" href="index.html">Dashboard</a>
            <a class="text-white text-decoration-none" href="gestion_ofertas.html">Gestión Ofertas</a>
            <a class="text-white text-decoration-none" href="gestion_usuarios.html">Gestión Usuarios</a>
        </div>
        
        <div class="d-flex align-items-center">
            <span class="text-white me-3" id="user-logged">Invitado</span>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        </div>
    </div>
    </nav>
    </nav>

    <div class="container">
        <h2>Registrar Nuevo Usuario</h2>
        <div class="card mb-5 shadow-sm">
            <div class="card-body">
                <form id="form-usuarios">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" id="apellido" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="email-nuevo" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="pass-nuevo" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Registrar Usuario</button>
                </form>
            </div>
        </div>

        <h3>Listado de Usuarios</h3>
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Email</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="js/usuarios.js"></script>
</body>
</html>
