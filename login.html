<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Producto 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex gap-4">
            <a class="text-white text-decoration-none" href="index.html">Dashboard</a>
            <a class="text-white text-decoration-none" href="gestion_ofertas.html">Gestión Ofertas</a>
            <a class="text-white text-decoration-none" href="gestion_usuarios.html">Gestión Usuarios</a>
        </div>
        
        <div class="d-flex align-items-center">
            <span class="text-white me-3" id="user-logged">Invitado</span>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        </div>
    </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>
                        <form id="form-login">
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                        <div id="mensaje-error" class="text-danger mt-3 text-center" style="display:none;">
                            Usuario o contraseña incorrectos
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/login.js"></script>
</body>
</html>
